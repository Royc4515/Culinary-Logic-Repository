services:
  - type: web
    name: clr-backend
    plan: free
    runtime: python
    # CRITICAL: In the Render dashboard, you MUST set "Root Directory" to "backend"
    # or the build will fail to find app.py.
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MAPS_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
